    <rect x="24" y="24" width="96" height="12" rx="6" fill="#38bdf8"/>
    <rect x="24" y="54" width="248" height="10" rx="5" fill="#475569"/>
    <rect x="24" y="76" width="214" height="10" rx="5" fill="#334155"/>
    <rect x="24" y="112" width="118" height="52" rx="12" fill="#0f172a" stroke="#1e293b"/>
